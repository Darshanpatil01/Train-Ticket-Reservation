<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>E-Trains | Seat Availability</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="header-content">
        <h1 class="hd">National Ticket Booking Spot</h1>
        <nav class="nav-links">
            <a href="userhome">Home</a>
            <a href="userviewtrainfwd">View Trains</a>
            <a href="trainbwstnfwd">Between Stations</a>
            <a href="bookingdetails">History</a>
            <a href="fareenqfwd">Fare</a>
            <a href="useravailfwd" class="active">Availability</a>
            <a href="usersearchtrain">Search</a>
            <a href="userprofile">Profile</a>
            <a href="userlogout" class="logout">Logout</a>
        </nav>
    </div>
</header>

<main class="container">

    <div class="main-header">
        <h2>Seat Availability</h2>
        <p>Check available seats for your selected train</p>
    </div>

    <div class="form-card">

        <form action="useravail" method="post">

            <div class="input-group">
                <label>Train Number</label>
                <input type="text" name="trainno" placeholder="Enter Train Number" required>
            </div>

            <button type="submit" class="submit-btn">
                Search Train Availability
            </button>

        </form>

    </div>

</main>

</body>
</html>
