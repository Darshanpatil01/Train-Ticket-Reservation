<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>E-Trains | Payment</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="header-content">
        <h1 class="hd">National Ticket Booking Spot</h1>
        <nav class="nav-links">
            <a href="userhome">Home</a>
            <a href="userviewtrainfwd">View Trains</a>
            <a href="trainbwstnfwd">Between Stations</a>
            <a href="bookingdetails">History</a>
            <a href="fareenqfwd">Fare</a>
            <a href="useravailfwd">Availability</a>
            <a href="usersearchtrain">Search</a>
            <a href="userprofile">Profile</a>
            <a href="userlogout" class="logout">Logout</a>
        </nav>
    </div>
</header>

<main class="container">

    <div class="main-header">
        <h2>Secure Payment</h2>
        <p>Enter your card details to complete booking</p>
    </div>

    <div class="form-card">

        <form action="booktrains" method="post">

            <div class="input-group">
                <label>Card Number</label>
                <input type="text" placeholder="XXXX XXXX XXXX XXXX" required>
            </div>

            <div class="input-group">
                <label>Card Holder Name</label>
                <input type="text" placeholder="Enter card holder name" required>
            </div>

            <div style="display:flex; gap:10px;">
                <div class="input-group" style="flex:1;">
                    <label>Expiry Date</label>
                    <input type="text" placeholder="MM / YY" required>
                </div>

                <div class="input-group" style="flex:1;">
                    <label>CVV</label>
                    <input type="password" placeholder="***" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                Confirm Payment
            </button>

        </form>

    </div>

</main>

</body>
</html>
