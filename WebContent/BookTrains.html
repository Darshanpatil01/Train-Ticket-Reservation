<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>E-Trains | Book Train</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="header-content">
        <h1 class="hd">National Ticket Booking Spot</h1>
        <nav class="nav-links">
            <a href="userhome">Home</a>
            <a href="userviewtrainfwd">View Trains</a>
            <a href="trainbwstnfwd">Between Stations</a>
            <a href="bookingdetails">History</a>
            <a href="fareenqfwd">Fare</a>
            <a href="useravailfwd">Availability</a>
            <a href="usersearchtrain">Search</a>
            <a href="userprofile">Profile</a>
            <a href="userlogout" class="logout">Logout</a>
        </nav>
    </div>
</header>

<main class="container">

    <div class="main-header">
        <h2>Book Train</h2>
        <p>Enter details to reserve your seats</p>
    </div>

    <div class="form-card">

        <div class="form-footer" style="margin-bottom: 15px;">
            <p>
                Please check 
                <a href="useravailfwd">Seat Availability</a> 
                before booking.
            </p>
        </div>

        <form action="booktrains" method="post">

            <div class="input-group">
                <label>Train Number</label>
                <input type="text" name="trainnumber" placeholder="Enter Train Number" required>
            </div>

            <div class="input-group">
                <label>Number of Seats</label>
                <input type="text" name="seats" placeholder="Enter number of seats" required>
            </div>

            <button type="submit" class="submit-btn">Book Now</button>

        </form>

    </div>

</main>

</body>
</html>
