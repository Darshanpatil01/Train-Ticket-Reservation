<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User Registration</title>
<link rel="stylesheet" href="UserHome_Css.css">
</head>

<body>

<header>
    <h1 class="hd">National Ticket Booking Spot</h1>

    <nav class="main">
        <a href="UserLogin.html">Login as User</a>
        <a href="UserRegister.html">New User Register</a>
        <a href="AdminLogin.html">Login as Admin</a>
    </nav>
</header>

<main>

    <h2 class="tab brown">New User Registration</h2>

    <form action="userreg" method="post" enctype="multipart/form-data" class="form-box">

        <label>Email Id</label>
        <input type="email" name="mailid" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" name="pword" required>

        <label>First Name</label>
        <input type="text" name="firstname" required>

        <label>Last Name</label>
        <input type="text" name="lastname" required>

        <label>Address</label>
        <input type="text" name="address" required>

        <label>Phone Number</label>
        <input type="number" name="phoneno" required>

        <label>Photo</label>
        <input type="file" name="userphoto">

        <button type="submit">Register</button>

    </form>

</main>
<footer>
    <p>© 2026 National Ticket Booking Spot</p>
</footer>
</body>
</html>
